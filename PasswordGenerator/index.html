<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <h1>Password Generator</h1>

    <!-- Display Section -->
    <div class="display-container">
      <input readonly placeholder="password" class="display" data-passwordDisplay />
      <button class="copyBtn" data-copy>
        <span data-copyMsg></span>
        <img src="copy.svg" alt="copy" width="23" height="23" />
      </button>
    </div>

    <!-- Input Controls -->
    <div class="input-container">

      <!-- Password Length -->
      <div class="length-container">
        <p>Password Length: <span data-lengthNumber>10</span></p>
      </div>
      <input 
        type="range" 
        min="1" 
        max="20" 
        value="10" 
        step="1" 
        class="slider" 
        data-lengthSlider 
      />

      <!-- Checkboxes -->
      <div class="check">
        <input type="checkbox" id="lowercase" />
        <label for="lowercase">Include Lowercase Letters</label>
      </div>

      <div class="check">
        <input type="checkbox" id="uppercase" />
        <label for="uppercase">Include Uppercase Letters</label>
      </div>

      <div class="check">
        <input type="checkbox" id="numbers" />
        <label for="numbers">Include Numbers</label>
      </div>

      <div class="check">
        <input type="checkbox" id="symbols" />
        <label for="symbols">Include Symbols</label>
      </div>

      <!-- Strength Indicator -->
      <div class="strength-container">
        <p>Strength</p>
        <div class="indicator" data-indicator></div>
      </div>

      <!-- Generate Button -->
      <button class="generateButton">Generate Password</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
